name: Harness PR Enforcement

on:
  pull_request_target:
    branches:
      - main
    types:
      - opened
      - edited
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  pull-requests: read

jobs:
  enforce-harness-pr:
    name: Harness PR Evidence
    runs-on: ubuntu-latest
    steps:
      - name: Validate harness pull-request authority
        uses: actions/github-script@v7
        with:
          script: |
            const core = require('@actions/core');
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;
            const body = pr.body || '';
            const errors = [];

            const requiredHeadings = [
              '## Task identity',
              '## Objective',
              '## Files changed',
              '## Files intentionally not changed',
              '## Validation',
              '## Known limitations',
              '## Deferred work',
              '## Internal review',
              '## Boundaries',
              '## Human-review boundary'
            ];

            function taskIdentities(markdown) {
              return [...(markdown || '').matchAll(/\*\*Task:\*\*\s*(P\d+-(?:T|GATE)-\d+)\b/gi)]
                .map((match) => match[1].toUpperCase());
            }

            function soleTaskIdentity(markdown) {
              const identities = taskIdentities(markdown);
              return identities.length === 1 ? identities[0] : null;
            }

            function sectionContent(markdown, heading) {
              const lines = (markdown || '').split(/\r?\n/);
              const start = lines.findIndex((line) => line.trim().toLowerCase() === heading.toLowerCase());
              if (start === -1) return '';
              let end = lines.length;
              for (let index = start + 1; index < lines.length; index += 1) {
                if (/^##\s+/.test(lines[index])) {
                  end = index;
                  break;
                }
              }
              return lines.slice(start + 1, end).join('\n').trim();
            }

            for (const heading of requiredHeadings) {
              const content = sectionContent(body, heading);
              if (!content) {
                errors.push(`Missing or empty required PR section: ${heading}`);
              }
            }

            if (!/human review and approval are required/i.test(body)) {
              errors.push('PR must state that human review and approval are required.');
            }
            if (!/No additional task was selected or started\./i.test(body)) {
              errors.push('PR must state: No additional task was selected or started.');
            }

            const taskId = soleTaskIdentity(body);
            const phaseMatch = body.match(/\*\*Phase:\*\*\s*(Phase\s+\d+[^\n]*)/i);
            if (!taskId) {
              errors.push('PR must identify exactly one ordinary task with **Task:** P<phase>-T<n> or P<phase>-GATE-<n>.');
            }
            if (!phaseMatch) {
              errors.push('PR must identify exactly one phase with **Phase:** Phase <n>.');
            }

            const validation = sectionContent(body, '## Validation');
            const validationRows = validation
              .split(/\r?\n/)
              .map((line) => line.trim())
              .filter((line) => /^[-*]\s+/.test(line));
            const acceptedValidationOutcome = /\*\*(?:passed|intentionally not applicable|intentionally unavailable before merge)\*\*/i;
            if (validationRows.length === 0) {
              errors.push('Validation must contain at least one evidence row.');
            }
            if (!validationRows.some((row) => /\b(?:command|inspect|validat|check|compar)/i.test(row))) {
              errors.push('Validation must record at least one command, inspection, check, or comparison outcome.');
            }
            for (const row of validationRows) {
              if (!acceptedValidationOutcome.test(row)) {
                errors.push(`Validation evidence must state a successful or approved-not-applicable outcome: ${row}`);
              }
              if (/\*\*(?:failed|blocked)\*\*/i.test(row) || /\b(?:required\s+)?(?:validation|tests?|checks?)\b[^.\n]*\b(?:failed|failure|blocked)\b/i.test(row)) {
                errors.push(`Required validation is not successful: ${row}`);
              }
            }
            const testRows = validationRows.filter((row) => /\btests?(?:\s+status)?\s*:/i.test(row));
            if (testRows.length === 0) {
              errors.push('Validation must record a Tests: outcome or explicit intentional non-applicability.');
            }
            for (const row of testRows) {
              if (!/\*\*(?:passed|intentionally not applicable)\*\*/i.test(row)) {
                errors.push(`Tests must be passed or explicitly intentionally not applicable: ${row}`);
              }
            }

            const internalReview = sectionContent(body, '## Internal review');
            if (!/^[-*]\s+\*\*Result:\*\*\s*\S+/im.test(internalReview)) {
              errors.push('Internal review must state a nonempty **Result:** outcome.');
            }
            if (/\*\*Result:\*\*[\s\S]*?\b(?:blocked|major)\b/i.test(internalReview)) {
              errors.push('Internal review contains a blocked or major finding.');
            }

            const openPulls = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'open',
              base: 'main',
              per_page: 100
            });
            const otherHarnessPulls = openPulls.filter((candidate) => {
              if (candidate.number === pr.number) return false;
              const text = `${candidate.title || ''}\n${candidate.body || ''}`;
              return /\bP\d+-(?:T|GATE)-\d+\b|SYS-PLAN-NEXT-TRANCHE|SYS-PLAN-BOOTSTRAP-\d+/i.test(text);
            });
            if (otherHarnessPulls.length > 0) {
              errors.push(`Another harness PR is open: #${otherHarnessPulls.map((candidate) => candidate.number).join(', #')}.`);
            }

            if (taskId && phaseMatch) {
              const phaseNumber = (phaseMatch[1].match(/Phase\s+(\d+)/i) || [])[1];
              const taskPath = `docs/development/harness/tasks/${taskId}.md`;
              const registerPath = `docs/development/harness/PHASE-${phaseNumber}-TASK-REGISTER.md`;

              const closedPulls = await github.paginate(github.rest.pulls.list, {
                owner,
                repo,
                state: 'closed',
                base: 'main',
                per_page: 100
              });
              const mergedTaskPulls = closedPulls.filter((candidate) =>
                Boolean(candidate.merged_at) && soleTaskIdentity(candidate.body) === taskId
              );
              if (mergedTaskPulls.length > 0) {
                errors.push(`Task ${taskId} already has merged PR evidence: #${mergedTaskPulls.map((candidate) => candidate.number).join(', #')}.`);
              }

              async function readText(path) {
                const response = await github.rest.repos.getContent({
                  owner,
                  repo,
                  path,
                  ref: pr.base.sha
                });
                if (Array.isArray(response.data) || response.data.type !== 'file') {
                  throw new Error(`${path} is not a file.`);
                }
                return Buffer.from(response.data.content, response.data.encoding).toString('utf8');
              }

              let definition = '';
              let register = '';
              try {
                definition = await readText(taskPath);
              } catch (error) {
                errors.push(`Unable to read executable task definition ${taskPath}: ${error.message}`);
              }
              try {
                register = await readText(registerPath);
              } catch (error) {
                errors.push(`Unable to read active phase register ${registerPath}: ${error.message}`);
              }

              if (definition) {
                const requiredDefinitionMarkers = [
                  `**Task ID:** ${taskId}`,
                  '**Phase:**',
                  '**Title:**',
                  '**Task type:**',
                  '**Predecessor dependency:**',
                  '**Task-state authority:**',
                  '## Purpose',
                  '## Allowed Paths',
                  '## Forbidden Scope',
                  '## Required Authority Documents',
                  '## Required Deliverable',
                  '## Acceptance Criteria',
                  '## Required Validation',
                  '## Stop Condition',
                  '## Later-Task Boundary'
                ];
                for (const marker of requiredDefinitionMarkers) {
                  if (!definition.includes(marker)) {
                    errors.push(`Task definition ${taskPath} is missing required marker: ${marker}`);
                  }
                }
                const authorityIndex = definition.indexOf('**Task-state authority:**');
                const purposeIndex = definition.indexOf('## Purpose');
                if (authorityIndex === -1 || purposeIndex === -1 || authorityIndex > purposeIndex) {
                  errors.push(`Task definition ${taskPath} must place Task-state authority before Purpose.`);
                }
                if (!definition.includes(`**Phase:** ${phaseMatch[1].trim()}`)) {
                  errors.push(`Task definition phase does not match PR phase: ${phaseMatch[1].trim()}.`);
                }
              }

              if (register && !new RegExp(`\\|\\s*\\d+\\s*\\|\\s*${taskId}\\s*\\|`, 'i').test(register)) {
                errors.push(`Task ${taskId} is not listed in the active Phase ${phaseNumber} register.`);
              }

              if (definition) {
                const predecessorMatch = definition.match(/\*\*Predecessor dependency:\*\*\s*([^\n]+)/i);
                const predecessor = predecessorMatch ? predecessorMatch[1].match(/\bP\d+-(?:T|GATE)-\d+\b/i) : null;
                if (predecessor) {
                  const predecessorId = predecessor[0].toUpperCase();
                  const mergedPredecessor = closedPulls.some((candidate) =>
                    Boolean(candidate.merged_at) && soleTaskIdentity(candidate.body) === predecessorId
                  );
                  if (!mergedPredecessor) {
                    errors.push(`Predecessor ${predecessorId} does not have exact merged task evidence.`);
                  }
                }

                const allowedSection = (definition.match(/## Allowed Paths\s*\n([\s\S]*?)(?=\n## )/i) || [])[1] || '';
                const allowedPaths = [...allowedSection.matchAll(/`([^`]+)`/g)]
                  .map((match) => match[1])
                  .filter((path) => !path.startsWith('docs/development/harness/tasks/'));
                const changedFiles = await github.paginate(github.rest.pulls.listFiles, {
                  owner,
                  repo,
                  pull_number: pr.number,
                  per_page: 100
                });
                const pathMatches = (changedPath, allowedPath) => {
                  if (allowedPath.endsWith('/**')) {
                    return changedPath.startsWith(allowedPath.slice(0, -2));
                  }
                  return changedPath === allowedPath;
                };
                if (allowedPaths.length === 0) {
                  errors.push(`Task definition ${taskPath} has no machine-readable allowed repository paths.`);
                }
                for (const changed of changedFiles) {
                  if (!allowedPaths.some((allowedPath) => pathMatches(changed.filename, allowedPath))) {
                    errors.push(`Changed file is outside task scope: ${changed.filename}`);
                  }
                }
              }
            }

            if (errors.length > 0) {
              core.setFailed(errors.join('\n'));
            } else {
              core.notice('Harness PR evidence, exact task lifecycle, and substantive required evidence are valid.');
            }