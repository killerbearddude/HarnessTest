name: Harness PR Enforcement

on:
  pull_request_target:
    branches:
      - main
    types:
      - opened
      - edited
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  pull-requests: read

jobs:
  enforce-harness-pr:
    name: Harness PR Evidence
    runs-on: ubuntu-latest
    steps:
      - name: Validate harness pull-request authority
        uses: actions/github-script@v7
        with:
          script: |
            const core = require('@actions/core');
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;
            const body = pr.body || '';
            const errors = [];

            const requiredHeadings = [
              '## Task identity',
              '## Objective',
              '## Files changed',
              '## Files intentionally not changed',
              '## Validation',
              '## Known limitations',
              '## Deferred work',
              '## Internal review',
              '## Boundaries',
              '## Human-review boundary'
            ];

            for (const heading of requiredHeadings) {
              if (!body.includes(heading)) {
                errors.push(`Missing required PR section: ${heading}`);
              }
            }

            if (!/human review and approval are required/i.test(body)) {
              errors.push('PR must state that human review and approval are required.');
            }
            if (!/No additional task was selected or started\./i.test(body)) {
              errors.push('PR must state: No additional task was selected or started.');
            }

            const taskMatch = body.match(/\*\*Task:\*\*\s*(P\d+-(?:T|GATE)-\d+)/i);
            const phaseMatch = body.match(/\*\*Phase:\*\*\s*(Phase\s+\d+[^\n]*)/i);
            if (!taskMatch) {
              errors.push('PR must identify exactly one ordinary task with **Task:** P<phase>-T<n> or P<phase>-GATE-<n>.');
            }
            if (!phaseMatch) {
              errors.push('PR must identify exactly one phase with **Phase:** Phase <n>.');
            }

            const openPulls = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'open',
              base: 'main',
              per_page: 100
            });
            const otherHarnessPulls = openPulls.filter((candidate) => {
              if (candidate.number === pr.number) return false;
              const text = `${candidate.title || ''}\n${candidate.body || ''}`;
              return /\bP\d+-(?:T|GATE)-\d+\b|SYS-PLAN-NEXT-TRANCHE|SYS-PLAN-BOOTSTRAP-\d+/i.test(text);
            });
            if (otherHarnessPulls.length > 0) {
              errors.push(`Another harness PR is open: #${otherHarnessPulls.map((candidate) => candidate.number).join(', #')}.`);
            }

            if (taskMatch && phaseMatch) {
              const taskId = taskMatch[1].toUpperCase();
              const phaseNumber = (phaseMatch[1].match(/Phase\s+(\d+)/i) || [])[1];
              const taskPath = `docs/development/harness/tasks/${taskId}.md`;
              const registerPath = `docs/development/harness/PHASE-${phaseNumber}-TASK-REGISTER.md`;

              async function readText(path) {
                const response = await github.rest.repos.getContent({
                  owner,
                  repo,
                  path,
                  ref: pr.base.sha
                });
                if (Array.isArray(response.data) || response.data.type !== 'file') {
                  throw new Error(`${path} is not a file.`);
                }
                return Buffer.from(response.data.content, response.data.encoding).toString('utf8');
              }

              let definition = '';
              let register = '';
              try {
                definition = await readText(taskPath);
              } catch (error) {
                errors.push(`Unable to read executable task definition ${taskPath}: ${error.message}`);
              }
              try {
                register = await readText(registerPath);
              } catch (error) {
                errors.push(`Unable to read active phase register ${registerPath}: ${error.message}`);
              }

              if (definition) {
                const requiredDefinitionMarkers = [
                  `**Task ID:** ${taskId}`,
                  '**Phase:**',
                  '**Title:**',
                  '**Task type:**',
                  '**Predecessor dependency:**',
                  '**Task-state authority:**',
                  '## Purpose',
                  '## Allowed Paths',
                  '## Forbidden Scope',
                  '## Required Authority Documents',
                  '## Required Deliverable',
                  '## Acceptance Criteria',
                  '## Required Validation',
                  '## Stop Condition',
                  '## Later-Task Boundary'
                ];
                for (const marker of requiredDefinitionMarkers) {
                  if (!definition.includes(marker)) {
                    errors.push(`Task definition ${taskPath} is missing required marker: ${marker}`);
                  }
                }
                const authorityIndex = definition.indexOf('**Task-state authority:**');
                const purposeIndex = definition.indexOf('## Purpose');
                if (authorityIndex === -1 || purposeIndex === -1 || authorityIndex > purposeIndex) {
                  errors.push(`Task definition ${taskPath} must place Task-state authority before Purpose.`);
                }
                if (!definition.includes(`**Phase:** ${phaseMatch[1].trim()}`)) {
                  errors.push(`Task definition phase does not match PR phase: ${phaseMatch[1].trim()}.`);
                }
              }

              if (register && !new RegExp(`\\|\\s*\\d+\\s*\\|\\s*${taskId}\\s*\\|`, 'i').test(register)) {
                errors.push(`Task ${taskId} is not listed in the active Phase ${phaseNumber} register.`);
              }

              if (definition) {
                const predecessorMatch = definition.match(/\*\*Predecessor dependency:\*\*\s*([^\n]+)/i);
                const predecessor = predecessorMatch ? predecessorMatch[1].match(/\bP\d+-(?:T|GATE)-\d+\b/i) : null;
                if (predecessor) {
                  const closedPulls = await github.paginate(github.rest.pulls.list, {
                    owner,
                    repo,
                    state: 'closed',
                    base: 'main',
                    per_page: 100
                  });
                  const mergedPredecessor = closedPulls.some((candidate) =>
                    Boolean(candidate.merged_at) &&
                    new RegExp(`\\b${predecessor[0]}\\b`, 'i').test(`${candidate.title || ''}\n${candidate.body || ''}`)
                  );
                  if (!mergedPredecessor) {
                    errors.push(`Predecessor ${predecessor[0]} does not have merged PR evidence.`);
                  }
                }

                const allowedSection = (definition.match(/## Allowed Paths\s*\n([\s\S]*?)(?=\n## )/i) || [])[1] || '';
                const allowedPaths = [...allowedSection.matchAll(/`([^`]+)`/g)]
                  .map((match) => match[1])
                  .filter((path) => !path.startsWith('docs/development/harness/tasks/'));
                const changedFiles = await github.paginate(github.rest.pulls.listFiles, {
                  owner,
                  repo,
                  pull_number: pr.number,
                  per_page: 100
                });
                const pathMatches = (changedPath, allowedPath) => {
                  if (allowedPath.endsWith('/**')) {
                    return changedPath.startsWith(allowedPath.slice(0, -2));
                  }
                  return changedPath === allowedPath;
                };
                if (allowedPaths.length === 0) {
                  errors.push(`Task definition ${taskPath} has no machine-readable allowed repository paths.`);
                }
                for (const changed of changedFiles) {
                  if (!allowedPaths.some((allowedPath) => pathMatches(changed.filename, allowedPath))) {
                    errors.push(`Changed file is outside task scope: ${changed.filename}`);
                  }
                }
              }
            }

            if (errors.length > 0) {
              core.setFailed(errors.join('\n'));
            } else {
              core.notice('Harness PR evidence, task authority, predecessor evidence, and changed-file scope are valid.');
            }